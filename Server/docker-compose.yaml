version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: pg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: preppanda
      POSTGRES_PASSWORD: preppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: preppanda
      MINIO_ROOT_PASSWORD: preppass
    ports:
      - "9000:9000"   # API
      - "9090:9090"   # Web UI
    volumes:
      - minio_data:/data
    networks:
      - app_net

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 preppanda preppass;
      mc mb local/uploads;
      mc anonymous set public local/uploads;
      exit 0;
      "
    networks:
      - app_net

volumes:
  db_data:
  minio_data:

networks:
  app_net: